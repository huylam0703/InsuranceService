name: Maven Test

on:
  push:
    branches:
      - main
      - dev/huylam

  pull_request:
    branches:
      - main
      - dev/huylam

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build and Test
        run: mvn clean verify